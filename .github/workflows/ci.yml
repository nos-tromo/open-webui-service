name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    # Org-wide reusable infra workflow, pinned to the latest major tag (@v2).
    # For this repo it runs yamllint + `docker compose config`; the hadolint and
    # shellcheck jobs find no matching files and skip, since there is no
    # Dockerfile (the upstream image is pinned, not built) and no scripts/. No
    # compose profiles are used here, so only compose-files is passed.
    uses: nos-tromo/.github/.github/workflows/infra-validation.yml@v3
    with:
      compose-files: '-f docker/compose.yaml -f docker/compose.override.yaml'
